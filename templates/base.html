<!-- =============================================================================
     templates/base.html

     Base layout for the entire site.
     Includes: Tailwind CDN, navbar, search bar, footer
     All other templates extend this file.
============================================================================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VOLAR{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#1a1a1a",
            soft:   "#f5f5f0",
          },
          fontFamily: {
            display: ["'Playfair Display'", "serif"],
            body:    ["'DM Sans'", "sans-serif"],
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  {% block extra_head %}{% endblock %}

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
  </style>
</head>

<body class="
  bg-white
  text-gray-900
  antialiased">

  <nav class="
    bg-white
    shadow-md">

    <div class="
      px-4
      py-3
      flex
      items-center
      justify-between">
      
      <!-- Logo -->
      <a href="" class="
       text-xl
       font-bold
       "> 
       <span class="
        text-red-500">
        V</span>OLAR
      </a>
      <!-- end Logo -->

      <!-- Search -->
       <div class="
        ">

        <input 
          type="text"
          placeholder="Search..."
          class="
          w-full
          border
          rounded-lg">

       </div>
      <!-- end Search -->

      <!-- Links -->
       <div class="
        flex
        items-center
        gap-4">
          
          <!-- Cart -->
           <!-- <div>
             🛒
            <span>0</span>
           </div> -->
          <!-- end Cart -->

          <!-- User -->
          <a href="" class="bg-blue-500 text-white px-1 py-1 rounded">
            Account
          </a>
          <!-- end User -->
       </div>
      <!-- end Links -->

   
    </div>
  </nav>

  <nav class="
   flex
   justify-center
   items-center
   px-4
   py-1
   bg-black
   shadow-md
   ">
    <!-- Links -->
       <div class="
        flex
        items-center
        gap-4">
          <a href="/" class="text-white">HOME</a>
          <a href="/products" class="text-white">PRODUCTS</a>
       </div>
      <!-- end Links -->
  </nav>  
  <!-- ── Page content ── -->
  <main class="min-h-screen">
    {% block content %}{% endblock %}
  </main>


</body>
</html>
