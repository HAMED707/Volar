{% extends "base.html" %}

{% block content %}

{% for product in products %}
  <div>
    <img src="{{ product.image.url }}" alt="{{ product.name }}" /> 
    <div> {{ product.name  }} </div>
    <div> {{ product.price }} </div>
    <div> {{ product.stock }} </div>
  </div>
{% endfor %}

{% endblock  %}
