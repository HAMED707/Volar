{% extends "base.html" %}
{% block title %}Products — VOLAR{% endblock %}
{% block content %}

<div class="max-w-6xl mx-auto px-4">

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">

    {% for product in products %}

    <!-- Card -->
      <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg">
        
        {% if product.image %}
        <img 
        src="{{ product.image.url }}" 
        alt="{{ product.name }}" 
        class="w-full h-48 object-contain rounded-md mb-4"
        /> 
        {% endif %}

        <div class="text-lg font-semibold mb-1">
          {{ product.name }}
        </div>

        <div class="text-blue-600 font-bold mb-1">
          ${{ product.price }}
        </div>

        <div class="text-sm text-gray-500">
          Stock: {{ product.stock }}
        </div>

      </div>
    <!-- end Card -->

    {% endfor %}

  </div>

</div>

{% endblock  %}
